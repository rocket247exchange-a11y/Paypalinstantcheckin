<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Portal</title>
    <style>
        /* --- General Reset & Styling --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 800px;
            background-color: #ffffff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        @media (min-width: 450px) {
            .app-container {
                height: 85vh;
                border-radius: 16px;
            }
        }

        .screen {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 0;
            left: 0;
            transition: opacity 0.3s ease;
        }

        .hidden {
            opacity: 0;
            pointer-events: none;
            z-index: -1;
        }

        .active {
            opacity: 1;
            pointer-events: auto;
            z-index: 10;
        }

        /* --- Screen 1: Login (Blue Screen) --- */
        #login-screen {
            background-color: #0056b3; 
            color: #ffffff;
            padding: 40px 24px;
            justify-content: center;
        }

        .login-title {
            text-align: center;
            font-size: 28px;
            margin-bottom: 40px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            opacity: 0.9;
        }

        .form-control {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-login {
            background-color: #ffffff;
            color: #0056b3;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: #f8f9fa;
        }

        /* --- Loading Screens & Spinners --- */
        .loading-screen {
            background-color: #f8f9fa;
            justify-content: center;
            align-items: center;
            padding: 24px;
            text-align: center;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 6px solid #e2e8f0;
            border-top: 6px solid #0056b3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 24px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .transcript-text {
            font-size: 18px;
            color: #333;
            font-weight: 500;
            min-height: 60px;
        }

        .error-text {
            color: #dc3545;
            font-weight: bold;
        }

        /* --- Screen 3: Dashboard / Transactions --- */
        #dashboard-screen {
            background-color: #f0f2f5;
            padding: 24px;
        }

        .header {
            margin-bottom: 30px;
            padding-top: 20px;
        }

        .user-name {
            font-size: 22px;
            color: #1a1a1a;
            font-weight: bold;
        }

        .section-title {
            font-size: 14px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }

        .countdown-accent {
            color: #10b981; /* Green color for header countdown */
        }

        .transaction-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: auto; 
        }

        .transaction-card {
            background-color: #ffffff;
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #10b981; /* Green visual marker border */
        }

        .tx-sender {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .tx-status {
            font-size: 13px;
            color: #10b981; /* Changed notice badges to green */
            font-weight: 600;
            background-color: #e6f4ea; /* Light green background badge look */
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
        }

        .tx-amount {
            font-size: 18px;
            font-weight: bold;
            color: #111;
        }

        .bottom-container {
            margin-top: 40px;
        }

        .btn-drop {
            background-color: #dc3545;
            color: #ffffff;
        }

        .btn-drop:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>

    <div class="app-container">

        <div id="login-screen" class="screen active">
            <h1 class="login-title">Welcome</h1>
            <form id="login-form">
                <div class="form-group">
                    <label>Email or Username</label>
                    <input type="text" class="form-control" required placeholder="Enter username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" required placeholder="Enter password">
                </div>
                <button type="submit" class="btn btn-login">Login</button>
            </form>
        </div>

        <div id="loading-screen-1" class="screen hidden loading-screen">
            <div class="spinner"></div>
            <div id="transcript-1" class="transcript-text">loading user page</div>
        </div>

        <div id="dashboard-screen" class="screen hidden">
            <div class="header">
                <div class="user-name">JASVIR SINGH DHILLON</div>
            </div>

            <div class="section-title">
                <span>Available In:</span>
                <span id="countdown-timer" class="countdown-accent">02:00:00</span>
            </div>
            
            <div class="transaction-list">
                <div class="transaction-card">
                    <div>
                        <div class="tx-sender">sukuna DHILLON</div>
                        <div class="tx-status" id="badge-1">02:00:00</div>
                    </div>
                    <div class="tx-amount">100 GBP</div>
                </div>
                
                <div class="transaction-card">
                    <div>
                        <div class="tx-sender">shenice Baxter</div>
                        <div class="tx-status" id="badge-2">02:00:00</div>
                    </div>
                    <div class="tx-amount">$1,611.00</div>
                </div>
            </div>

            <div class="bottom-container">
                <button id="drop-btn" class="btn btn-drop">drop pending transactions instantly</button>
            </div>
        </div>

        <div id="loading-screen-2" class="screen hidden loading-screen">
            <div id="spinner-2" class="spinner"></div>
            <div id="transcript-2" class="transcript-text">loading all pending transactions</div>
        </div>

    </div>

    <script>
        // DOM Elements
        const loginForm = document.getElementById('login-form');
        const loginScreen = document.getElementById('login-screen');
        const loadingScreen1 = document.getElementById('loading-screen-1');
        const dashboardScreen = document.getElementById('dashboard-screen');
        const loadingScreen2 = document.getElementById('loading-screen-2');
        
        const transcript1 = document.getElementById('transcript-1');
        const transcript2 = document.getElementById('transcript-2');
        const spinner2 = document.getElementById('spinner-2');
        const dropBtn = document.getElementById('drop-btn');

        const countdownTimer = document.getElementById('countdown-timer');
        const badge1 = document.getElementById('badge-1');
        const badge2 = document.getElementById('badge-2');

        let countdownInterval;

        // Function to switch active screens
        function showScreen(screenElement) {
            document.querySelectorAll('.screen').forEach(s => {
                s.classList.remove('active');
                s.classList.add('hidden');
            });
            screenElement.classList.remove('hidden');
            screenElement.classList.add('active');
        }

        // Start 2 Hours Countdown Timer Function
        function startCountdown() {
            let totalSeconds = 2 * 60 * 60; // 2 hours in seconds

            countdownInterval = setInterval(() => {
                if (totalSeconds <= 0) {
                    clearInterval(countdownInterval);
                    countdownTimer.innerText = "00:00:00";
                    badge1.innerText = "Available Now";
                    badge2.innerText = "Available Now";
                    return;
                }

                totalSeconds--;

                let hours = Math.floor(totalSeconds / 3600);
                let minutes = Math.floor((totalSeconds % 3600) / 60);
                let seconds = totalSeconds % 60;

                // Format numbers to always ensure 2 digits (e.g. 02:05:09)
                let formattedTime = 
                    String(hours).padStart(2, '0') + ":" + 
                    String(minutes).padStart(2, '0') + ":" + 
                    String(seconds).padStart(2, '0');

                // Update DOM text contents
                countdownTimer.innerText = formattedTime;
                badge1.innerText = formattedTime;
                badge2.innerText = formattedTime;

            }, 1000);
        }

        // Handle Login Submission
        loginForm.addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            showScreen(loadingScreen1);

            // Timeline: Wait 2.5 seconds, then update transcript
            setTimeout(() => {
                transcript1.innerText = "user found JASVIR SINGH DHILLON 2 pending transactions";
                
                // Timeline: Wait 2.5 more seconds, then show Dashboard and run countdown
                setTimeout(() => {
                    showScreen(dashboardScreen);
                    startCountdown(); // Call countdown loop on entry
                }, 2500);

            }, 2500);
        });

        // Handle Drop Pending Transactions Click
        dropBtn.addEventListener('click', function() {
            clearInterval(countdownInterval); // Clear the running timer block
            showScreen(loadingScreen2);

            // Timeline: Wait 3 seconds, then show error message and hide spinner
            setTimeout(() => {
                spinner2.style.display = 'none'; 
                transcript2.innerHTML = '<span class="error-text">failed payment missing try again</span>';
            }, 3000);
        });
    </script>
</body>
</html>
